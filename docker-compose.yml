# paylane — full local stack. `docker compose up --build` brings up Postgres x2, LocalStack
# (SNS/SQS + DLQ), the services, the dashboard, and the observability stack (Tempo, Prometheus,
# Grafana). No cloud account required.
name: paylane

# OpenTelemetry auto-instrumentation, shared by every JVM service. The agent is baked into each
# image but only activates because JAVA_TOOL_OPTIONS points at it here. Traces go to Tempo over
# OTLP; the messaging flags make the agent inject/extract W3C trace context via SNS/SQS message
# attributes, so a payment's trace stays connected across the async boundary.
x-otel-env: &otel-env
  JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
  OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf   # HTTP is the reliable OTLP path here
  OTEL_TRACES_EXPORTER: otlp
  OTEL_BSP_SCHEDULE_DELAY: "1000"
  OTEL_METRICS_EXPORTER: none
  OTEL_LOGS_EXPORTER: none
  OTEL_PROPAGATORS: tracecontext,baggage
  OTEL_INSTRUMENTATION_AWS_SDK_EXPERIMENTAL_USE_PROPAGATOR_FOR_MESSAGING: "true"
  OTEL_INSTRUMENTATION_MESSAGING_EXPERIMENTAL_RECEIVE_TELEMETRY_ENABLED: "true"

services:
  postgres-payment:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paylane
      POSTGRES_PASSWORD: paylane
      POSTGRES_DB: payment
    ports:
      - "55432:5432"   # host-side debug port; services connect over the compose network
    volumes:
      - ./infra/postgres/payment-init.sql:/docker-entrypoint-initdb.d/payment-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paylane -d payment"]
      interval: 3s
      timeout: 3s
      retries: 20

  postgres-ledger:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paylane
      POSTGRES_PASSWORD: paylane
      POSTGRES_DB: ledger
    ports:
      - "55433:5432"   # host-side debug port; services connect over the compose network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paylane -d ledger"]
      interval: 3s
      timeout: 3s
      retries: 20

  localstack:
    image: localstack/localstack:3.8
    environment:
      SERVICES: sns,sqs
      AWS_DEFAULT_REGION: ap-southeast-2
      SQS_ENDPOINT_STRATEGY: path
    ports:
      - "4566:4566"
    volumes:
      - ./infra/localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs get-queue-url --queue-name settlement-queue || exit 1"]
      interval: 4s
      timeout: 5s
      retries: 25

  # ── observability ───────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo/tempo.yaml
    ports:
      - "3200:3200"   # Tempo query API (Grafana connects internally)

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3300:3000"   # Grafana UI (host 3300 to avoid the dashboard's 3000)
    depends_on:
      - tempo
      - prometheus

  # ── services ────────────────────────────────────────────────────
  ledger:
    build: ./services/ledger
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: ledger
      SERVER_PORT: 8082
      LEDGER_DB_URL: jdbc:postgresql://postgres-ledger:5432/ledger
      LEDGER_DB_USER: paylane
      LEDGER_DB_PASSWORD: paylane
    ports:
      - "8082:8082"
    depends_on:
      postgres-ledger:
        condition: service_healthy
      tempo:
        condition: service_started

  payment-api:
    build: ./services/payment-api
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: payment-api
      SERVER_PORT: 8081
      PAYMENT_DB_URL: jdbc:postgresql://postgres-payment:5432/payment
      PAYMENT_DB_USER: paylane
      PAYMENT_DB_PASSWORD: paylane
      AWS_REGION: ap-southeast-2
      AWS_ENDPOINT: http://localstack:4566
      PAYLANE_SNS_TOPIC_ARN: arn:aws:sns:ap-southeast-2:000000000000:payment-events
    ports:
      - "8081:8081"
    depends_on:
      postgres-payment:
        condition: service_healthy
      localstack:
        condition: service_healthy
      tempo:
        condition: service_started

  # Reactive twin of payment-api (WebFlux + R2DBC). Same API, own database. Used by the benchmark.
  payment-api-reactive:
    build: ./services/payment-api-reactive
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: payment-api-reactive
      SERVER_PORT: 8091
      PAYMENT_R2DBC_URL: r2dbc:postgresql://postgres-payment:5432/payment_reactive
      PAYMENT_JDBC_URL: jdbc:postgresql://postgres-payment:5432/payment_reactive
      PAYMENT_DB_USER: paylane
      PAYMENT_DB_PASSWORD: paylane
      AWS_REGION: ap-southeast-2
      AWS_ENDPOINT: http://localstack:4566
      PAYLANE_SNS_TOPIC_ARN: arn:aws:sns:ap-southeast-2:000000000000:payment-events
    ports:
      - "8091:8091"
    depends_on:
      postgres-payment:
        condition: service_healthy
      localstack:
        condition: service_healthy
      tempo:
        condition: service_started

  settlement-worker:
    build: ./services/settlement-worker
    environment:
      <<: *otel-env
      OTEL_SERVICE_NAME: settlement-worker
      SERVER_PORT: 8083
      SETTLEMENT_DB_URL: jdbc:postgresql://postgres-ledger:5432/ledger?currentSchema=settlement
      SETTLEMENT_DB_USER: paylane
      SETTLEMENT_DB_PASSWORD: paylane
      AWS_REGION: ap-southeast-2
      AWS_ENDPOINT: http://localstack:4566
      PAYLANE_SQS_QUEUE_URL: http://localstack:4566/000000000000/settlement-queue
      PAYLANE_LEDGER_URL: http://ledger:8082
    ports:
      - "8083:8083"
    depends_on:
      postgres-ledger:
        condition: service_healthy
      localstack:
        condition: service_healthy
      ledger:
        condition: service_started
      tempo:
        condition: service_started

  # Thin read-only UI in the merchant-ops design; typed client generated from the OpenAPI specs.
  merchant-dashboard:
    build: ./dashboard
    environment:
      PAYMENT_API_URL: http://payment-api:8081
      SETTLEMENT_URL: http://settlement-worker:8083
      LEDGER_URL: http://ledger:8082
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"   # set DASHBOARD_PORT if 3000 is taken locally
    depends_on:
      payment-api:
        condition: service_started
      settlement-worker:
        condition: service_started
      ledger:
        condition: service_started
