name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write          # push images to GHCR
  security-events: write   # upload Trivy SARIF to the Security tab

env:
  JAVA_VERSION: "25"

jobs:
  # 1. Build + unit + integration tests (Testcontainers spins real Postgres/LocalStack on the runner).
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ledger, payment-api, payment-api-reactive, settlement-worker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Build & test (unit + Testcontainers integration)
        working-directory: services/${{ matrix.service }}
        run: mvn -B verify -Dnet.bytebuddy.experimental=true
      - name: Coverage summary
        if: always()
        working-directory: services/${{ matrix.service }}
        run: |
          CSV=target/site/jacoco/jacoco.csv
          if [ -f "$CSV" ]; then
            awk -F, -v svc="${{ matrix.service }}" 'NR>1 {lm+=$8; lc+=$9}
              END { cov=(lc+lm>0)?100*lc/(lc+lm):0;
                    printf "**%s** line coverage: %.1f%% (%d/%d lines)\n", svc, cov, lc, lc+lm }' \
              "$CSV" | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "no jacoco.csv (build may have failed before report)"
          fi
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-${{ matrix.service }}
          path: services/${{ matrix.service }}/target/site/jacoco
          if-no-files-found: ignore

  # 2. DevSecOps: OWASP dependency check (SCA). Non-blocking — reports, uploads, never gates the
  #    build. Set an NVD_API_KEY repo secret to speed up / avoid NVD rate limits.
  dependency-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ledger, payment-api, payment-api-reactive, settlement-worker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: OWASP dependency-check
        continue-on-error: true
        working-directory: services/${{ matrix.service }}
        run: >
          mvn -B org.owasp:dependency-check-maven:10.0.4:check
          -DfailBuildOnCVSS=11
          -DnvdApiKey=${{ secrets.NVD_API_KEY }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-${{ matrix.service }}
          path: services/${{ matrix.service }}/target/dependency-check-report.html
          if-no-files-found: ignore

  # 3. End-to-end smoke: bring the whole stack up and prove the money actually moves + a k6 smoke.
  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bring up the stack
        run: docker compose up -d --build
      - name: Wait for services
        run: |
          for name in 8081 8082 8083 8091; do
            printf 'waiting for :%s ' "$name"
            for _ in $(seq 1 60); do
              curl -fsS "localhost:$name/actuator/health" >/dev/null 2>&1 && { echo ok; break; }
              printf '.'; sleep 3
            done
          done
      - name: End-to-end demo (pay -> settle -> books balance)
        run: ./scripts/demo.sh
      - name: Install k6
        uses: grafana/setup-k6-action@v1
      - name: k6 smoke
        run: |
          mkdir -p bench/out
          k6 run -q -e BASE_URL=http://localhost:8081 -e VUS=10 -e DURATION=10s \
            -e RUN_ID=ci-smoke -e OUT=bench/out/ci-smoke.json bench/mixed.js
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=200
      - name: Tear down
        if: always()
        run: docker compose down -v

  # 4. Build images, scan with Trivy (SARIF -> Security tab), push to GHCR on main.
  image:
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ledger, payment-api, payment-api-reactive, settlement-worker]
    steps:
      - uses: actions/checkout@v4
      - name: Compute image ref (lowercased for GHCR)
        run: |
          echo "IMAGE=$(echo ghcr.io/${{ github.repository }}/${{ matrix.service }} \
            | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Build image
        run: docker build -t "$IMAGE:${{ github.sha }}" "services/${{ matrix.service }}"
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      - name: Trivy scan (report to job summary)
        run: |
          echo "### Trivy — ${{ matrix.service }} (CRITICAL/HIGH)" >> "$GITHUB_STEP_SUMMARY"
          trivy image --no-progress --severity CRITICAL,HIGH --exit-code 0 \
            --format table "$IMAGE:${{ github.sha }}" | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Trivy SARIF
        run: |
          trivy image --no-progress --severity CRITICAL,HIGH --exit-code 0 \
            --format sarif --output "trivy-${{ matrix.service }}.sarif" "$IMAGE:${{ github.sha }}"
      - name: Upload SARIF to code scanning
        if: always()
        continue-on-error: true   # requires Advanced Security on private repos; non-blocking
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.sarif
          if-no-files-found: ignore
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag "$IMAGE:${{ github.sha }}" "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
