name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write          # push images to GHCR
  security-events: write   # upload Trivy SARIF to the Security tab

env:
  JAVA_VERSION: "21"

jobs:
  # 1. Build + unit + integration tests (Testcontainers spins real Postgres/LocalStack on the runner).
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ledger, payment-api, payment-api-reactive, settlement-worker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Build & test
        working-directory: services/${{ matrix.service }}
        run: mvn -B verify

  # 2. DevSecOps: OWASP dependency check (SCA). Non-blocking — reports, uploads, never gates the
  #    build. Set an NVD_API_KEY repo secret to speed up / avoid NVD rate limits.
  dependency-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ledger, payment-api, payment-api-reactive, settlement-worker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: OWASP dependency-check
        continue-on-error: true
        working-directory: services/${{ matrix.service }}
        run: >
          mvn -B org.owasp:dependency-check-maven:10.0.4:check
          -DfailBuildOnCVSS=11
          -DnvdApiKey=${{ secrets.NVD_API_KEY }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-${{ matrix.service }}
          path: services/${{ matrix.service }}/target/dependency-check-report.html
          if-no-files-found: ignore

  # 3. End-to-end smoke: bring the whole stack up and prove the money actually moves + a k6 smoke.
  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bring up the stack
        run: docker compose up -d --build
      - name: Wait for services
        run: |
          for name in 8081 8082 8083 8091; do
            printf 'waiting for :%s ' "$name"
            for _ in $(seq 1 60); do
              curl -fsS "localhost:$name/actuator/health" >/dev/null 2>&1 && { echo ok; break; }
              printf '.'; sleep 3
            done
          done
      - name: End-to-end demo (pay -> settle -> books balance)
        run: ./scripts/demo.sh
      - name: Install k6
        uses: grafana/setup-k6-action@v1
      - name: k6 smoke
        run: |
          mkdir -p bench/out
          k6 run -q -e BASE_URL=http://localhost:8081 -e VUS=10 -e DURATION=10s \
            -e RUN_ID=ci-smoke -e OUT=bench/out/ci-smoke.json bench/mixed.js
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=200
      - name: Tear down
        if: always()
        run: docker compose down -v

  # 4. Build images, scan with Trivy (SARIF -> Security tab), push to GHCR on main.
  image:
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ledger, payment-api, payment-api-reactive, settlement-worker]
    steps:
      - uses: actions/checkout@v4
      - name: Compute image ref (lowercased for GHCR)
        run: |
          echo "IMAGE=$(echo ghcr.io/${{ github.repository }}/${{ matrix.service }} \
            | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Build image
        run: docker build -t "$IMAGE:${{ github.sha }}" "services/${{ matrix.service }}"
      - name: Trivy image scan (report only)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag "$IMAGE:${{ github.sha }}" "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
